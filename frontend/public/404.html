<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VaultIQ</title>
  <script>
    // GitHub Pages SPA redirect
    // Redirects 404s back to index.html preserving the path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/VaultIQ/' +
      '?p=' + encodeURIComponent(l.pathname.slice('/VaultIQ'.length) + l.search) +
      '&q=' + (l.search ? l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
