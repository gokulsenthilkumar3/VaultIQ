services:
  # ---------------------------------------------------------------------------
  # NestJS Backend
  # ---------------------------------------------------------------------------
  - type: web
    name: vaultiq-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    # migrate deploy runs schema migrations; then start the compiled server
    startCommand: npx prisma migrate deploy && node dist/main
    # /health returns 200 OK — used by Render to verify the service is live
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: vaultiq-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: FRONTEND_URL
        sync: false

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  - type: web
    name: vaultiq-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    # standalone output mode: Next.js writes a self-contained server to .next/standalone
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  - type: redis
    name: vaultiq-redis
    region: singapore
    plan: free
    ipAllowList: []
