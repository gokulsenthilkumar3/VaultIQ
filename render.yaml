services:
  # ── NestJS Backend ────────────────────────────────────────────────────
  - type: web
    name: vaultiq-backend
    runtime: node
    region: singapore
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx nest build
    startCommand: node dist/main
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: vaultiq-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  # ── Next.js Frontend ────────────────────────────────────────────────
  - type: web
    name: vaultiq-frontend
    runtime: node
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: vaultiq-backend
          property: host

  # ── Redis Cache ─────────────────────────────────────────────────────
  - type: redis
    name: vaultiq-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
